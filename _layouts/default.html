<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <div class="controls">
          <button id="theme-toggle" aria-label="Toggle dark mode">🌓</button>
        </div>
      </div>
    </header>

    <div class="content">
      {{ content }}
    </div>

    <footer class="site-footer">
      <div class="wrap">© {{ site.title }} — generated with Jekyll</div>
    </footer>

    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/search.js"></script>

    <!-- Analytics placeholder: set `google_analytics` in _config.yml or add your provider here -->
    {% if site.google_analytics and site.google_analytics != "" %}
    <!-- Google Analytics snippet (add your ID in _config.yml) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}gtag('js', new Date());
      gtag('config', '{{ site.google_analytics }}');
    </script>
    {% endif %}
  </body>
</html>
