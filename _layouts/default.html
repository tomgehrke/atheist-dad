<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div>
          <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <p class="site-tagline">{{ site.description }}</p>
        </div>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/tags/' | relative_url }}">Tags</a>
          <button id="theme-toggle" aria-label="Toggle dark mode">🌓</button>
        </nav>
      </header>

      <main>
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>© {{ site.title }}</p>
      </footer>
    </div>

    <script>
      const toggle = document.getElementById('theme-toggle');
      const root = document.documentElement;
      const mode = localStorage.getItem('atheistdad-theme') || 'dark';
      if (mode === 'dark') {
        root.setAttribute('data-theme', 'dark');
      }
      toggle && toggle.addEventListener('click', () => {
        const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        if (next === 'dark') root.setAttribute('data-theme', 'dark'); else root.removeAttribute('data-theme');
        localStorage.setItem('atheistdad-theme', next);
      });
    </script>
  </body>
</html>
