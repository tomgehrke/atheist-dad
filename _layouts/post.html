---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}{% if page.categories %} • {{ page.categories | join: ", " }}{% endif %}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  {% if page.tags %}
  <p class="post-tags">Tags: {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% unless forloop.last %}, {% endunless %}{% endfor %}</p>
  {% endif %}
</article>
