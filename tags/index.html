---
layout: default
title: Tags
---

<main class="wrap">
  <h1>Tags</h1>
  {% for tag in site.tags %}
  <section>
    <h2 id="tag-{{ tag[0] }}">{{ tag[0] }} ({{ tag[1].size }})</h2>
    <ul>
      {% for post in tag[1] %}
      <li><a href="{{ post.url | relative_url }}">{{ post.title }}</a> — <small>{{ post.date | date: "%b %-d, %Y" }}</small></li>
      {% endfor %}
    </ul>
  </section>
  {% endfor %}
</main>
