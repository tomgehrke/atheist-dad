---
layout: default
title: Tags
---

<section class="page-shell">
  <header>
    <h1>Tags</h1>
    <p>Browse posts by tag.</p>
  </header>
  <ul class="tag-list">
    {% for tag in site.tags %}
      <li><a href="#{{ tag[0] }}">{{ tag[0] }} ({{ tag[1].size }})</a></li>
    {% endfor %}
  </ul>
  {% for tag in site.tags %}
    <section id="{{ tag[0] }}">
      <h2>{{ tag[0] }}</h2>
      <ul>
        {% for post in tag[1] %}
          <li><a href="{{ post.url | relative_url }}">{{ post.title }}</a></li>
        {% endfor %}
      </ul>
    </section>
  {% endfor %}
</section>
