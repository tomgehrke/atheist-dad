{% if include.tags or page.tags %}
  {% assign tags = include.tags | default: page.tags %}
  {% if tags.size > 0 %}
    <div class="tag-list">
      <span>Tags:</span>
      {% for tag in tags %}
        <a class="tag-link" href="/tags/{{ tag | downcase | slugify }}/">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
      {% endfor %}
    </div>
  {% endif %}
{% endif %}
